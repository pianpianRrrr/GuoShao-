<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书馆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#6c5ce7;
  --primary-dark:#5a4bd1;
  --primary-light:#a29bfe;
  --bg:#f8f9fa;
  --card:#fff;
  --text:#2d3436;
  --text-light:#636e72;
  --border:#e9ecef;
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --shadow-hover:0 8px 30px rgba(108,92,231,0.15);
  --radius:16px;
  --font-read:'Noto Serif SC',serif;
  --font-ui:'Noto Sans SC',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;padding-bottom:80px;}

/* 顶部导航 */
header{background:linear-gradient(135deg,#6c5ce7 0%,#a29bfe 100%);padding:0;box-shadow:0 4px 20px rgba(108,92,231,0.3);}
.header-inner{max-width:800px;margin:0 auto;padding:24px 20px 20px;}
.header-inner h1{font-size:22px;font-weight:700;color:white;margin-bottom:4px;letter-spacing:2px;}
.header-inner h1::before{content:'✦ ';opacity:0.7;}
.header-tip{font-size:13px;color:rgba(255,255,255,0.8);}

/* 页面容器 */
.page{display:none;padding:20px;max-width:800px;margin:0 auto;}
.page.active{display:block;animation:fadeIn 0.3s ease;}

/* 通用卡片 */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}

/* 列表页 */
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.list-header h2{font-size:18px;font-weight:600;color:var(--text);}

.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:12px 20px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,92,231,0.3);}
.btn-primary:active{transform:translateY(0);}

/* 小说卡片 */
.novel-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);border:1px solid transparent;}
.novel-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--primary-light);}
.novel-card h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.novel-card h3::before{content:'📚';font-size:14px;}
.novel-card .meta{font-size:12px;color:var(--text-light);display:flex;align-items:center;gap:16px;}
.novel-card .meta span{display:flex;align-items:center;gap:4px;}
.novel-card.locked h3::before{content:'🔒';}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.5;}
.empty-state p{font-size:14px;}

/* 写作页 */
#writePage .card{padding:28px;}
.input-group{margin-bottom:20px;}
.input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-light);margin-bottom:8px;letter-spacing:1px;}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--font-ui);transition:all 0.2s;background:var(--bg);}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{outline:none;border-color:var(--primary);background:white;box-shadow:0 0 0 4px rgba(108,92,231,0.1);}
.input-group textarea{min-height:350px;resize:vertical;line-height:1.8;}
.input-actions{display:flex;gap:12px;margin-top:8px;}
.btn-save{background:linear-gradient(135deg,#00b894 0%,#00cec9 100%);color:white;border:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;flex:1;transition:all 0.2s;}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,184,148,0.3);}
.btn-cancel{background:white;color:var(--text-light);border:2px solid var(--border);padding:14px 20px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-cancel:hover{border-color:var(--primary);color:var(--primary);}

/* 阅读页 */
.read-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.read-actions{display:flex;gap:10px;}
.btn-back{background:white;color:var(--text);border:2px solid var(--border);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-back:hover{border-color:var(--primary);color:var(--primary);}
.btn-delete{background:white;color:#e17055;border:2px solid #fab1a0;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-delete:hover{background:#e17055;color:white;border-color:#e17055;}

.read-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;padding-left:12px;border-left:4px solid var(--primary);}

/* 阅读工具栏 */
.read-toolbar{background:white;border-radius:12px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.toolbar-group{display:flex;align-items:center;gap:6px;}
.toolbar-label{font-size:12px;color:var(--text-light);font-weight:500;}
.font-btn{width:34px;height:34px;border:2px solid var(--border);background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.font-btn:hover{border-color:var(--primary);color:var(--primary);background:#f8f9ff;}
.font-btn:active{transform:scale(0.95);}
.line-btn{padding:8px 12px;background:white;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);transition:all 0.2s;}
.line-btn:hover{border-color:var(--primary);color:var(--primary);}
.color-btn{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;margin:0;padding:0;transition:all 0.2s;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.color-btn:hover{transform:scale(1.1);}
.color-btn.active{border-color:var(--primary);box-shadow:0 0 0 3px white,0 0 0 5px var(--primary);}
.text-color-btn{width:26px;height:26px;border-radius:6px;border:3px solid transparent;cursor:pointer;margin:0;padding:0;transition:all 0.2s;}
.text-color-btn:hover{transform:scale(1.1);}
.text-color-btn.active{border-color:var(--primary);box-shadow:0 0 0 3px white,0 0 0 5px var(--primary);}
.toolbar-sep{width:1px;height:28px;background:var(--border);margin:0 4px;}

/* 阅读内容 */
.read-content{background:white;border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);font-family:var(--font-read);line-height:2;font-size:16px;color:var(--text);white-space:pre-wrap;min-height:300px;transition:all 0.3s;}

/* 底部导航 */
.nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:100;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;background:none;border:none;cursor:pointer;color:var(--text-light);font-size:11px;font-weight:500;transition:all 0.2s;}
.nav-btn.active{color:var(--primary);}
.nav-btn .icon{font-size:22px;}
.nav-btn:hover{color:var(--primary);}

/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* 统计徽章 */
.stats{font-size:12px;color:var(--text-light);}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d3436;color:white;padding:12px 24px;border-radius:30px;font-size:13px;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 密码弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:white;border-radius:20px;padding:32px;width:90%;max-width:360px;text-align:center;transform:scale(0.9);transition:transform 0.3s;}
.modal.show{transform:scale(1);}
.modal h3{font-size:18px;margin-bottom:8px;color:var(--text);}
.modal p{font-size:13px;color:var(--text-light);margin-bottom:20px;}
.modal input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;text-align:center;margin-bottom:16px;}
.modal input:focus{outline:none;border-color:var(--primary);}
.modal-btns{display:flex;gap:12px;}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;}
.modal-btns .cancel-btn{background:#f1f2f6;color:var(--text-light);}
.modal-btns .confirm-btn{background:var(--primary);color:white;}
.modal-btns .confirm-btn:hover{background:var(--primary-dark);}

/* 滚动条 */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-light);}

/* 响应式 */
@media(max-width:480px){
  .header-inner{padding:20px 16px 16px;}
  .page{padding:16px;}
  .card{padding:20px;}
  .read-content{padding:24px 20px;}
  .read-toolbar{gap:8px;padding:12px 14px;}
  .toolbar-sep{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>图书馆</h1>
    <div class="header-tip" id="status">加载中…</div>
  </div>
</header>

<!-- 书架列表 -->
<div class="page active" id="listPage">
  <div class="list-header">
    <h2>📖 我的书架</h2>
    <div class="stats" id="stats"></div>
  </div>
  <button class="btn-primary" onclick="go('writePage')">
    <span>✏️</span> 写新小说
  </button>
  <div id="list" style="margin-top:20px;"></div>
</div>

<!-- 写作页 -->
<div class="page" id="writePage">
  <div class="card">
    <div class="input-group">
      <label>书名 / 标题</label>
      <input id="title" placeholder="给小说起个名字…" maxlength="50">
    </div>
    <div class="input-group">
      <label>访问密码（选填，留空则无需密码）</label>
      <input id="password" type="password" placeholder="设置密码保护（可选）" maxlength="20">
    </div>
    <div class="input-group">
      <label>正文内容</label>
      <textarea id="content" placeholder="在这里开始你的创作…"></textarea>
    </div>
    <div class="input-actions">
      <button class="btn-cancel" onclick="go('listPage')">取消</button>
      <button class="btn-save" onclick="save()">📤 保存并同步</button>
    </div>
  </div>
</div>

<!-- 阅读页 -->
<div class="page" id="readPage">
  <div class="read-header">
    <div class="read-actions">
      <button class="btn-back" onclick="go('listPage')">← 书架</button>
      <button class="btn-delete" onclick="del()">🗑 删除</button>
    </div>
  </div>

  <h2 class="read-title" id="readTitle"></h2>

  <!-- 阅读工具栏 -->
  <div class="read-toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">字号</span>
      <button class="font-btn" onclick="changeFontSize(-2)" title="缩小">A-</button>
      <button class="font-btn" onclick="changeFontSize(2)" title="放大">A+</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">行距</span>
      <button class="line-btn" onclick="changeLineHeight(-0.3)">疏</button>
      <button class="line-btn" onclick="changeLineHeight(0.3)">密</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">背景</span>
      <button class="color-btn active" style="background:#fef9e7;" onclick="changeBg('#fef9e7', this)" title="护眼黄"></button>
      <button class="color-btn" style="background:#f0f8ff;" onclick="changeBg('#f0f8ff', this)" title="淡蓝"></button>
      <button class="color-btn" style="background:#f5f5f5;" onclick="changeBg('#f5f5f5', this)" title="浅灰"></button>
      <button class="color-btn" style="background:#1a1a1a;" onclick="changeBg('#1a1a1a', this)" title="夜间"></button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">文字</span>
      <button class="text-color-btn active" style="background:#333;" onclick="changeTextColor('#333', this)" title="深灰"></button>
      <button class="text-color-btn" style="background:#8B4513;" onclick="changeTextColor('#8B4513', this)" title="暗红"></button>
      <button class="text-color-btn" style="background:#1a5276;" onclick="changeTextColor('#1a5276', this)" title="藏蓝"></button>
    </div>
  </div>

  <div class="read-content" id="readContent"></div>
</div>

<!-- 底部导航 -->
<div class="nav">
  <button class="nav-btn active" onclick="go('listPage')" id="navList">
    <span class="icon">📚</span> 书架
  </button>
  <button class="nav-btn" onclick="go('writePage')" id="navWrite">
    <span class="icon">✏️</span> 写作
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 密码验证弹窗 -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal">
    <h3>🔒 请输入访问密码</h3>
    <p id="modalNovelTitle"></p>
    <input type="password" id="passwordInput" placeholder="请输入密码" maxlength="20">
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">取消</button>
      <button class="confirm-btn" onclick="confirmPassword()">确认</button>
    </div>
  </div>
</div>

<script>
const BIN_ID = '02f4ae85f8d369fab81c'
const API_URL = `https://api.npoint.io/${BIN_ID}`

let currentId = null
let pendingNovelIndex = null
let db = []

// 读取偏好
let fontSize = parseInt(localStorage.getItem('novelFontSize')) || 17
let lineHeight = parseFloat(localStorage.getItem('novelLineHeight')) || 2.0
let bgColor = localStorage.getItem('novelBgColor') || '#fef9e7'
let textColor = localStorage.getItem('novelTextColor') || '#333'

// Toast提示
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), duration)
}

async function init() {
  applySettings()
  try {
    const r = await fetch(API_URL)
    if (!r.ok) throw new Error('网络错误')
    const data = await r.json()
    db = data.novels || []
    showStatus('✅ 已从云端同步，共 ' + db.length + ' 篇')
    renderList()
  } catch(e) {
    showStatus('⚠️ 同步失败，已加载本地数据')
    db = JSON.parse(localStorage.getItem('localNovels')) || []
    renderList()
  }
}

function showStatus(text) {
  document.getElementById('status').innerText = text
}

function applySettings() {
  const el = document.getElementById('readContent')
  el.style.fontSize = fontSize + 'px'
  el.style.lineHeight = lineHeight
  el.style.backgroundColor = bgColor
  el.style.color = textColor
}

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById(id).classList.add('active')

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  if (id === 'listPage') {
    document.getElementById('navList').classList.add('active')
  } else if (id === 'writePage') {
    document.getElementById('navWrite').classList.add('active')
  }

  if (id === 'readPage') {
    applySettings()
  }
  window.scrollTo(0, 0)
}

function changeFontSize(delta) {
  fontSize = Math.min(28, Math.max(13, fontSize + delta))
  localStorage.setItem('novelFontSize', fontSize)
  document.getElementById('readContent').style.fontSize = fontSize + 'px'
}

function changeLineHeight(delta) {
  lineHeight = Math.min(3.0, Math.max(1.4, lineHeight + delta))
  localStorage.setItem('novelLineHeight', lineHeight)
  document.getElementById('readContent').style.lineHeight = lineHeight
}

function changeBg(color, btn) {
  bgColor = color
  localStorage.setItem('novelBgColor', color)
  document.getElementById('readContent').style.backgroundColor = color
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

function changeTextColor(color, btn) {
  textColor = color
  localStorage.setItem('novelTextColor', color)
  document.getElementById('readContent').style.color = color
  document.querySelectorAll('.text-color-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

function escapeHtml(str) {
  const div = document.createElement('div')
  div.textContent = str
  return div.innerHTML
}

function renderList() {
  const list = document.getElementById('list')
  const stats = document.getElementById('stats')

  if (!db || db.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>图书馆空空如也</p>
        <p style="margin-top:6px;font-size:12px;opacity:0.7;">点击上方「写新小说」开始创作</p>
      </div>
    `
    stats.textContent = ''
    return
  }

  stats.textContent = db.length + ' 篇'

  list.innerHTML = db.map((n, i) => `
    <div class="novel-card ${n.password && n.password.trim() ? 'locked' : ''}" onclick="read(${i})">
      <h3>${escapeHtml(n.title)}</h3>
      <div class="meta">
        <span>📅 ${n.time || '未知时间'}</span>
        <span>📝 ${n.content.length} 字</span>
        ${n.password && n.password.trim() ? '<span>🔒 已加密</span>' : ''}
      </div>
    </div>
  `).join('')
}

function read(i) {
  const n = db[i]
  if (n && n.password && n.password.trim() !== '') {
    // 有密码，弹出验证
    pendingNovelIndex = i
    document.getElementById('modalNovelTitle').textContent = n.title
    document.getElementById('passwordInput').value = ''
    document.getElementById('passwordModal').classList.add('show')
    document.getElementById('passwordInput').focus()
    return
  }
  // 无密码，直接显示
  doRead(i)
}

function doRead(i) {
  currentId = i
  const n = db[i]
  document.getElementById('readTitle').innerText = n.title
  document.getElementById('readContent').innerText = n.content
  go('readPage')
}

function closeModal() {
  document.getElementById('passwordModal').classList.remove('show')
  setTimeout(() => { pendingNovelIndex = null }, 300)
}

function confirmPassword() {
  const input = document.getElementById('passwordInput').value
  const novel = db[pendingNovelIndex]
  
  if (!novel) {
    showToast('❌ 加载失败，请重试')
    closeModal()
    return
  }
  
  if (input.trim() === novel.password.trim()) {
    const idx = pendingNovelIndex
    closeModal()
    setTimeout(() => doRead(idx), 50)
  } else {
    showToast('❌ 密码错误！')
    document.getElementById('passwordInput').value = ''
    document.getElementById('passwordInput').focus()
  }
}

// 回车确认密码
document.getElementById('passwordInput').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') {
    confirmPassword()
  }
})

async function save() {
  const title = document.getElementById('title').value.trim()
  const content = document.getElementById('content').value.trim()
  const password = document.getElementById('password').value.trim()

  if (!title) {
    showToast('⚠️ 请输入书名')
    return
  }
  if (!content) {
    showToast('⚠️ 请输入正文内容')
    return
  }
  
  const now = new Date().toLocaleString()
  db.unshift({ 
    title, 
    content, 
    password: password || '',
    time: now 
  })
  localStorage.setItem('localNovels', JSON.stringify(db))
  showStatus('正在同步云端…')
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novels: db })
    })
    if (!r.ok) throw new Error(await r.text())
    showToast('✅ 同步成功！')
  } catch(e) {
    showToast('⚠️ 已保存本地，云端同步失败')
  }
  document.getElementById('title').value = ''
  document.getElementById('content').value = ''
  document.getElementById('password').value = ''
  renderList()
  go('listPage')
}

async function del() {
  if (!confirm('确定删除这篇小说？删除后无法恢复。')) return
  db.splice(currentId, 1)
  localStorage.setItem('localNovels', JSON.stringify(db))
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novels: db })
    })
    showToast('✅ 已删除并同步')
  } catch(e) {
    showToast('⚠️ 已删除，云端同步失败')
  }
  renderList()
  go('listPage')
}

init()
</script>
</body>
